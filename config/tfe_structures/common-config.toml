#世界加载时是否把全部群系、群系标签和结构输出到日志。
#可以在日志中通过 [BIOME]、[BIOME_TAG] 和 [STRUCTURE] 关键字查找。
biomesTagsStructuresToLogs = false
#当结构配置没有指定 lootTablesOverrideMap 覆盖时，是否回退使用本模组内置 loot table。
#例如会尝试使用 tfe_structures:chests/desert_pyramid 替代 minecraft:chests/desert_pyramid。
