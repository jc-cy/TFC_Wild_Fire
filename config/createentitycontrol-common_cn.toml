#--------------------------------------------------------------------------
#此配置默认会在第一次忽略一次实体挤压。
#这样可以在第一次挤压时保护机器不损坏，从而帮助玩家。
keep_structure_at_first = true
#--------------------------------------------------------------------------
#记录列表刷新时间，默认3600秒。
#如果一个结构首次被忽略，且第二次发生时间小于3600秒，
#该结构将由本模组控制；若超过3600秒，则由Create控制。
#范围：0 ~ 36000
"keep structure refresh time(s)" = 3600
#--------------------------------------------------------------------------
#是否在方块无法转化为方块实体时记录问题。
"Log block entity problem" = false
#--------------------------------------------------------------------------
#是否记录额外运行时控制逻辑（如装置集群）的调试信息。
debug = false
#--------------------------------------------------------------------------
#破坏速度的10倍值 | 若设为14，则实际破坏速度计算为1.4倍。
#例如：黑曜石硬度40，这里变为400；泥土0.5，变为5。
#建议使用默认值，因为泥土和沙子会掉落，而石头会保留。
#范围：> 0
"10% of destroy speed" = 14
#--------------------------------------------------------------------------
#机械轴承旋转的专用最大速度。
#设为0则禁用此限制。若Create提供256转速，你设为128，则轴承以128旋转。
#若设置值高于原始Create速度，则保留原始速度。
#范围：> 0
"mechanical bearing gear max speed" = 128
#--------------------------------------------------------------------------
#方块实体在XZ平面的最大长度 | 若设为20：则17*42*20允许，而20*42*21禁止。
#范围：3 ~ 500
"block entity max length XZ" = 40
#--------------------------------------------------------------------------
#方块实体在Y轴的最大长度 | 若设为20：42*14*42允许，但42*24*42禁止。
#范围：3 ~ 500
"block entity max length Y" = 60
#--------------------------------------------------------------------------
#装置集群检测使用的扫描半径。
#仅在此半径内的装置会被合并为一个集群，以进行集群级别的限制检查。 
#范围：1.0 ~ 512.0
"contraption cluster scan radius" = 96.0
#--------------------------------------------------------------------------
#本地通知半径，用于附近的动作栏提示和覆盖层同步。
#范围：1.0 ~ 512.0
"contraption cluster local notify radius" = 96.0
#--------------------------------------------------------------------------
#在全局集群阻塞消息中列出附近玩家的搜索半径。
#这不会改变谁收到全局消息。
#范围：1.0 ~ 512.0
"contraption cluster global nearby players radius" = 96.0
#--------------------------------------------------------------------------
#应用于集群级别聚合方块限制的乘数（来自blocks_limit）。
#单个装置的限制保持不变；只有集群总数使用此乘数。
#范围：0.0 ~ 64.0
"contraption cluster block limit multiplier" = 1.5
#--------------------------------------------------------------------------
#启用对附近多个装置的链式集群检测。
#这可以检测多实体集群，但会消耗一些额外性能。
"contraption cluster chain detection" = true
#--------------------------------------------------------------------------
#装置集群验证的运行间隔，单位秒。
#这控制为了性能控制而添加的定期集群扫描冷却时间。
#范围：1 ~ 10
"contraption cluster scan interval seconds" = 1
#--------------------------------------------------------------------------
#全局集群阻塞聊天通知的冷却时间，单位分钟。
#范围：1 ~ 60
"contraption cluster global notify cooldown minutes" = 5
#--------------------------------------------------------------------------
