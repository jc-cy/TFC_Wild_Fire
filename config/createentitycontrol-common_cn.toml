#--------------------------------------------------------------------------
#不能被方块实体挤压破坏的方块列表。
#如果你用泥土挤压石头，且石头在此列表中，则泥土掉落而石头保留！
blocks_uncrushable = [
	"minecraft:deepslate",
	"minecraft:stone",
	"minecraft:cobblestone",
]
#--------------------------------------------------------------------------
#可以被方块实体挤压的方块列表。
#Create模组的默认配置。
#如果你用泥土挤压石头，且石头在此列表中，则石头掉落而泥土保留！
#如果添加流体，这些流体会像原版Create一样消失。
#警告：被岩浆烧毁的方块可能与玩家冲突，你可以添加minecraft:lava来避免方块被岩浆烧毁！
blocks_crushable = ["minecraft:water", "minecraft:lava"]
#--------------------------------------------------------------------------
#实体控制将忽略的方块列表。
#一些方块实体使用相同的功能，但有独特的方法和参数。
#将它们全部添加到此列表中将忽略这些实体。
#默认配置兼容Create:big cannon！只需添加新方块，不要移除它们！
#警告！确保新增的方块不会导致bug！
blocks_ignore = ["create:piston_extension_pole"]
#--------------------------------------------------------------------------
#启用时，方块会计算方块实体的实验性参数。这可能会花费极少的时间。
"calculate block stabilize para" = true
#--------------------------------------------------------------------------
#稳定参数的最大限制。一个普通方块默认稳定计数为100。
#根据存储箱设置可以避免方块实体NBT溢出。
#范围：> 0
"block entity max stabilize para" = 204800
